name: update-prices

on:
  schedule:
    - cron: "15 6-15 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install yfinance

      - name: Update prices
        run: python scripts/update_prices.py

      - name: Commit & push
        run: |
          git config user.name "wall-bot"
          git config user.email "wall-bot@users.noreply.github.com"
          git add data/prices.json data/history.json
          git diff --cached --quiet || git commit -m "prices $(date -u +'%Y-%m-%d %H:%M')"
          git push
