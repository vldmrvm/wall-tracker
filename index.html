<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Путь к €50 000</title>
<script src="chart.umd.js"></script>
<style>
  :root {
    --font:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --bg:#F5F6F7; --panel:#FFFFFF; --frame:#E2E5E8; --ink:#1C1F23; --sub:#6B7683;
    --plan:#1F77B4; --fact:#FF7F0E; --pos:#1F9D55; --neg:#D64545;
    --grid:#ECEEF0; --axis:#C7CCD1; --radius:12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    background:var(--bg); color:var(--ink); font-family:var(--font);
    overflow:hidden; padding:2.6vh 2.6vw;
    display:flex; flex-direction:column; gap:1.8vh;
    font-variant-numeric: tabular-nums;
  }
  .top { display:flex; justify-content:space-between; align-items:baseline;
    padding-bottom:1vh; border-bottom:1.5px solid var(--frame); }
  h1 { font-size:3vh; font-weight:700; letter-spacing:-0.01em; }
  h1 .thin { font-weight:400; color:var(--sub); font-size:2vh; }
  .updated { font-size:1.7vh; color:var(--sub); text-align:right; }
  .updated .dot { display:inline-block; width:1vh; height:1vh; border-radius:50%;
    background:var(--pos); margin-right:.5vh; animation:pulse 3s infinite; }
  @keyframes pulse { 50% { opacity:.25; } }

  .nums { display:grid; grid-template-columns:1.3fr 1fr 1fr; gap:1.4vw; }
  .num { border:1px solid var(--frame); background:var(--panel);
    border-radius:var(--radius); padding:1.8vh 1.4vw; }
  .num .k { font-size:1.5vh; color:var(--sub); margin-bottom:.6vh;
    text-transform:uppercase; letter-spacing:.06em; }
  .num .v { font-weight:700; font-size:4.6vh; letter-spacing:-0.015em; }
  .num .v.small { font-size:3.6vh; }
  .num .s { font-size:1.6vh; color:var(--sub); margin-top:.5vh; }
  .pos { color:var(--pos); } .neg { color:var(--neg); } .planc { color:var(--plan); }

  .barwrap { border:1px solid var(--frame); background:var(--panel);
    border-radius:var(--radius); padding:1.3vh 1.4vw; }
  .bar { position:relative; height:3vh; background:var(--grid);
    border-radius:.8vh; overflow:hidden; }
  .bar .fill { position:absolute; inset:0; width:0%; background:var(--plan);
    transition:width 1.2s ease; }
  .bar .txt { position:absolute; inset:0; display:flex; align-items:center;
    justify-content:space-between; padding:0 1vw; font-size:1.8vh; font-weight:700; }
  .bar .txt .l { color:#fff; mix-blend-mode:difference; }

  .chartcard { flex:1; border:1px solid var(--frame); background:var(--panel);
    border-radius:var(--radius); padding:1.4vh 1vw .6vh; min-height:0;
    display:flex; flex-direction:column; }
  .charttitle { text-align:center; font-size:1.9vh; font-weight:700; margin-bottom:.4vh; }
  .chartbox { flex:1; position:relative; min-height:220px; }
  #err { display:none; color:var(--neg); font-size:1.6vh; padding:.6vh 0; }
</style>
</head>
<body>
  <div class="top">
    <h1>Путь к €50 000 <span class="thin">· план: средняя S&P 500 · факт: Lightyear</span></h1>
    <div class="updated"><span class="dot"></span><span id="updated">загрузка…</span>
      · EUR/USD <span id="fxline">—</span></div>
  </div>

  <div class="nums">
    <div class="num">
      <div class="k">Портфель сейчас</div>
      <div class="v" id="total">—</div>
      <div class="s" id="totalnote"></div>
    </div>
    <div class="num">
      <div class="k">Против плана</div>
      <div class="v small" id="delta">—</div>
      <div class="s" id="deltanote"></div>
    </div>
    <div class="num">
      <div class="k">Цель по плану</div>
      <div class="v small planc" id="eta">—</div>
      <div class="s" id="etanote"></div>
    </div>
  </div>

  <div class="barwrap">
    <div class="bar">
      <div class="fill" id="fill"></div>
      <div class="txt"><span class="l" id="barleft">—</span><span id="barright">€50 000</span></div>
    </div>
  </div>

  <div class="chartcard">
    <div class="charttitle">Капитал: план против факта</div>
    <div id="err"></div>
    <div class="chartbox"><canvas id="chart"></canvas></div>
  </div>

<script>
const MONTHS_RU = ["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
const fmtEur = v => "€" + Math.round(v).toLocaleString("ru-RU");
let chart = null, TARGET_PLUGIN_DONE = false;

function cssv(n){ return getComputedStyle(document.body).getPropertyValue(n).trim(); }
function monthLabel(startDate, m) {
  const d = new Date(startDate);
  d.setMonth(d.getMonth() + Math.round(m));
  return MONTHS_RU[d.getMonth()] + " " + String(d.getFullYear()).slice(2);
}
function monthsBetween(fromIso, toIso) {
  const a = new Date(fromIso), b = new Date(toIso);
  return (b - a) / (1000 * 60 * 60 * 24 * 30.44);
}
function buildPlan(plan) {
  const pts = [{ x: 0, y: plan.start_value }];
  let v = plan.start_value, hit = null;
  for (let m = 1; m <= 300; m++) {
    v = v * (1 + plan.annual_rate_pct / 1200) + plan.monthly;
    pts.push({ x: m, y: v });
    if (hit === null && v >= plan.target) { hit = m; break; }
  }
  return { pts, hit };
}
function planValueAt(plan, m) {
  let v = plan.start_value, prev = v;
  const whole = Math.floor(m), frac = m - whole;
  for (let i = 1; i <= whole + 1; i++) {
    prev = v;
    v = v * (1 + plan.annual_rate_pct / 1200) + plan.monthly;
  }
  return prev + (v - prev) * Math.min(frac, 1);
}
async function loadJson(path) {
  const r = await fetch(path + "?ts=" + Date.now(), { cache: "no-store" });
  if (!r.ok) throw new Error(path + ": " + r.status);
  return r.json();
}

async function refresh() {
  try {
    const [holdings, prices, history] = await Promise.all([
      loadJson("data/holdings.json"),
      loadJson("data/prices.json"),
      loadJson("data/history.json"),
    ]);
    const plan = holdings.plan;
    const { pts: planPts, hit } = buildPlan(plan);
    const factPts = history.map(h => ({
      x: Math.max(0, monthsBetween(plan.start_date, h.date)), y: h.total_eur,
    }));

    const total = prices.total_eur;
    const nowM = Math.max(0, monthsBetween(plan.start_date, new Date().toISOString()));
    const planNow = planValueAt(plan, nowM);
    const delta = total - planNow;

    let dayNote = prices.positions.length + " позиций";
    if (history.length >= 2) {
      const d = history[history.length - 1].total_eur - history[history.length - 2].total_eur;
      dayNote = (d >= 0 ? "+€" : "−€") + Math.abs(Math.round(d)).toLocaleString("ru-RU") + " со вчера";
      document.getElementById("totalnote").className = "s " + (d >= 0 ? "pos" : "neg");
    }
    document.getElementById("total").textContent = fmtEur(total);
    document.getElementById("totalnote").textContent = dayNote;

    const dEl = document.getElementById("delta");
    dEl.className = "v small " + (delta >= 0 ? "pos" : "neg");
    dEl.textContent = (delta >= 0 ? "+€" : "−€") + Math.abs(Math.round(delta)).toLocaleString("ru-RU");
    document.getElementById("deltanote").textContent = "план на сегодня: " + fmtEur(planNow);

    document.getElementById("eta").textContent = hit ? monthLabel(plan.start_date, hit) : "> 25 лет";
    document.getElementById("etanote").textContent =
      hit ? (hit / 12).toFixed(1) + " лет · " + plan.annual_rate_pct + "% + " + fmtEur(plan.monthly) + "/мес" : "";

    const pct = Math.min(100, total / plan.target * 100);
    document.getElementById("fill").style.width = pct + "%";
    document.getElementById("barleft").textContent = fmtEur(total) + " · " + pct.toFixed(1) + "%";
    document.getElementById("barright").textContent = fmtEur(plan.target);

    const upd = new Date(prices.updated_utc);
    document.getElementById("updated").textContent =
      "обновлено " + upd.toLocaleString("ru-RU", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" });
    document.getElementById("fxline").textContent = prices.fx.EURUSD.toFixed(4);

    drawChart(planPts, factPts, plan);
    document.getElementById("err").style.display = "none";
  } catch (e) {
    const el = document.getElementById("err");
    el.textContent = "Ошибка данных: " + e.message + " — повторю через 15 мин";
    el.style.display = "block";
  }
}

function drawChart(planPts, factPts, plan) {
  const font = cssv("--font");
  const data = { datasets: [
    { label: "План (S&P 500, " + plan.annual_rate_pct + "%)", data: planPts,
      borderColor: cssv("--plan"), borderWidth: 2.5, pointRadius: 0, tension: 0.2, fill: false },
    { label: "Факт (Lightyear)", data: factPts,
      borderColor: cssv("--fact"), borderWidth: 2.5, pointRadius: 4,
      pointBackgroundColor: cssv("--fact"), pointBorderColor: "#fff",
      pointBorderWidth: 1.2, tension: 0.15 },
  ]};
  const opts = {
    responsive: true, maintainAspectRatio: false, animation: false,
    scales: {
      x: { type: "linear", min: 0, max: planPts[planPts.length - 1].x,
        grid: { color: cssv("--grid") }, border: { color: cssv("--axis"), width: 1.2 },
        ticks: { color: cssv("--ink"), font: { family: font, size: 14 },
          stepSize: 3, callback: v => monthLabel(plan.start_date, v), maxTicksLimit: 12 } },
      y: { min: 0, max: Math.ceil(plan.target * 1.15 / 5000) * 5000,
        grid: { color: cssv("--grid") }, border: { color: cssv("--axis"), width: 1.2 },
        ticks: { color: cssv("--ink"), font: { family: font, size: 14 },
          callback: v => "€" + v / 1000 + "k" } },
    },
    plugins: {
      legend: { position: "top", align: "end",
        labels: { color: cssv("--ink"), font: { family: font, size: 14 },
          boxWidth: 26, boxHeight: 3 } },
      tooltip: { enabled: false },
    },
  };
  if (chart) { chart.data = data; chart.options = opts; chart.update(); }
  else chart = new Chart(document.getElementById("chart"), { type: "line", data, options: opts });

  if (!TARGET_PLUGIN_DONE) {
    TARGET_PLUGIN_DONE = true;
    Chart.register({
      id: "targetline",
      afterDraw(c) {
        const y = c.scales.y.getPixelForValue(plan.target);
        const { left, right } = c.chartArea;
        const ctx = c.ctx;
        ctx.save();
        ctx.strokeStyle = cssv("--neg"); ctx.setLineDash([7, 5]); ctx.lineWidth = 1.4;
        ctx.beginPath(); ctx.moveTo(left, y); ctx.lineTo(right, y); ctx.stroke();
        ctx.fillStyle = cssv("--neg"); ctx.font = "13px " + font;
        ctx.fillText("цель €" + plan.target / 1000 + "k", right - 84, y - 8);
        ctx.restore();
      },
    });
    chart.update();
  }
}

function boot(){ if (window.Chart) refresh(); else setTimeout(boot, 150); }
boot();
setInterval(refresh, 15 * 60 * 1000);
</script>
</body>
</html>
